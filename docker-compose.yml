services:
  # 1. Etcd (Milvus 元数据依赖)
  etcd:
    container_name: smartrag-etcd
    image: quay.io/coreos/etcd:v3.5.25
    restart: unless-stopped
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-./data}/etcd:/etcd
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - smartrag-network

  # 2. Minio (Milvus 依赖 & SmartRAG 文档对象存储)
  minio:
    container_name: smartrag-minio
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    restart: unless-stopped
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
    ports:
      - "9001:9001" # 控制台端口
      - "9000:9000" # API 端口
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-./data}/minio:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - smartrag-network

  # 3. Milvus Standalone (SmartRAG 向量数据库)
  milvus:
    container_name: smartrag-milvus
    image: milvusdb/milvus:v2.6.11
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    security_opt:
    - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MQ_TYPE: woodpecker
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-./data}/milvus:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    ports:
      - "19530:19530" # gRPC / RESTful API
      - "9091:9091"   # 监控与健康检查
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - smartrag-network

  # 4. Attu (SmartRAG 向量库可视化面板)
  attu:
    container_name: smartrag-attu
    image: zilliz/attu:v2.6
    restart: unless-stopped
    environment:
      - MILVUS_URL=milvus:19530 # 使用 docker compose 的 service 名称访问
    ports:
      - "8000:3000"
    depends_on:
      milvus:
        condition: service_healthy
    networks:
      - smartrag-network

  # 5. MySQL (SmartRAG 业务数据库)
  mysql:
    container_name: smartrag-mysql
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "13306:3306"
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-./data}/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - smartrag-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: smartrag-backend
    restart: always
    # 直接读取整个 .env 文件中的所有环境变量
    env_file:
      - .env
    environment:
      # 以下变量用于覆盖 .env 中的本地配置，确保在 Docker 内部网络中能正确路由
      DB_HOST: mysql
      DB_PORT: 3306
      # 映射 DB 凭证 (因为你的 MySQL 容器用的是 MYSQL_DATABASE 这种标准变量)
      DB_NAME: ${MYSQL_DATABASE}
      DB_USERNAME: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      
      MILVUS_HOST: milvus
      MILVUS_PORT: 19530
      
      MINIO_ENDPOINT: http://minio:9000
    depends_on:
      mysql:
        condition: service_healthy
      minio:
        condition: service_healthy
      milvus:
        condition: service_healthy
    ports:
      - "${SERVER_PORT:-8080}:8080"
    volumes:
      - ./logs:/app/logs
    networks:
      - smartrag-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: smartrag-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "3000:80"
    networks:
      - smartrag-network

networks:
  smartrag-network:
    name: smartrag_network
    driver: bridge

