services:
  mysql:
    image: mysql:8.0
    container_name: smartdoc-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-123456}
      MYSQL_DATABASE: ${DB_NAME:-smart_doc}
    # 不再创建额外用户，去掉 MYSQL_USER / MYSQL_PASSWORD
    command: ["mysqld", "--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
    ports:
      - "13306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - smartdoc-net

  minio:
    image: minio/minio:RELEASE.2024-01-05T22-17-24Z
    container_name: smartdoc-minio
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-root}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-12345678}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - smartdoc-net

  milvus-etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: smartdoc-milvus-etcd
    restart: always
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
      # 可选：这个只是消掉日志里的警告，不影响功能
      # ETCD_UNSUPPORTED_ARCH: arm64
    command: >
      etcd
      -advertise-client-urls http://milvus-etcd:2379
      -listen-client-urls http://0.0.0.0:2379
      -data-dir /etcd
    volumes:
      - milvus_etcd:/etcd
    networks:
      - smartdoc-net

  milvus-minio:
    image: minio/minio:RELEASE.2024-01-05T22-17-24Z
    container_name: smartdoc-milvus-minio
    restart: always
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    command: server /data
    volumes:
      - milvus_minio:/data
    networks:
      - smartdoc-net

  milvus-standalone:
    image: milvusdb/milvus:v2.4.0
    container_name: smartdoc-milvus
    restart: always
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: milvus-etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    command: ["milvus", "run", "standalone"]
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - milvus-etcd
      - milvus-minio
    volumes:
      - milvus_data:/var/lib/milvus
    networks:
      - smartdoc-net

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: smartdoc-backend
    restart: always
    environment:
      # Database Configuration
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-smart_doc}
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_PASSWORD:-123456}

      # JWT Configuration
      JWT_SECRET: ${JWT_SECRET:-404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
      JWT_ISSUER_URI: http://backend:8080

      # GitHub OAuth Configuration (Optional)
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-your_github_client_id}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-your_github_client_secret}
      GITHUB_REDIRECT_URI: ${GITHUB_REDIRECT_URI:-http://localhost:8080/api/auth/callback/github}

      # AI Model Configuration
      GLM_API_KEY: ${GLM_API_KEY:-your_glm_api_key_here}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-your_openai_api_key_here}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-your_gemini_api_key_here}

      # Embedding Model Configuration
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-notnull}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-http://embedding-service:9997/v1/}
      EMBEDDING_MODEL_NAME: ${EMBEDDING_MODEL_NAME:-bge-m3}

      # Milvus Vector Database Configuration
      MILVUS_HOST: milvus-standalone
      MILVUS_PORT: 19530

      # MinIO Object Storage Configuration
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-root}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-12345678}

      # Spring Boot Server Configuration
      SERVER_PORT: 8080
    depends_on:
      - mysql
      - minio
      - milvus-standalone
    ports:
      - "8080:8080"
    volumes:
      - backend_doc_data:/app/doc_data
      - backend_processed_docs:/app/processed_docs
    networks:
      - smartdoc-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
      args:
        - REACT_APP_API_BASE=http://localhost:8080
    container_name: smartdoc-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "3000:80"
    networks:
      - smartdoc-net

networks:
  smartdoc-net:
    driver: bridge

volumes:
  mysql_data:
  minio_data:
  milvus_etcd:
  milvus_minio:
  milvus_data:
  backend_doc_data:
  backend_processed_docs:
